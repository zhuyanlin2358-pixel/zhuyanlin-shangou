<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║          闪购营销设计工作台 · 组件接入模板 v1.0              ║
  ║  复制这个文件 → 改成你的组件 → 发给朱彦霖 → 接入工具       ║
  ╚══════════════════════════════════════════════════════════════╝

  必填 meta（工具用来识别你的组件）:
-->
<meta name="sg-component"       content="true">             <!-- 固定不变 -->
<meta name="sg-name"            content="组件中文名">       <!-- 如：头图动效 -->
<meta name="sg-id"              content="your-comp-id">     <!-- 英文 kebab-case，如：header-anim -->
<meta name="sg-canvas-width"    content="750">              <!-- 画布宽度，通常 750 -->
<meta name="sg-canvas-height"   content="424">              <!-- 画布高度，见尺寸表 -->
<meta name="sg-version"         content="1.0.0">            <!-- 你的版本号 -->
<meta name="sg-author"          content="你的名字">

<title>组件名称 · 预览</title>
<style>
  /* ── 重置 & 基础 ────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

  /* ── 你的样式写在这里 ───────────────────────────────────────── */
  #canvas {
    display: block;
    width: 750px;
    height: 424px;
  }

  /* 示例：CSS 动效 */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- ═══════════════════════ 你的 HTML 结构写在这里 ══════════════════════════ -->
<canvas id="canvas" width="750" height="424"></canvas>

<!-- 或者用 div 布局也行：
<div id="root" style="width:750px;height:424px;position:relative;">
  <div class="title" style="...">标题文案</div>
</div>
-->

<!-- ═══════════════════════ 必须保留的接口代码 ══════════════════════════════ -->
<script>
/**
 * ─────────────────────────────────────────────────────────────
 *  接口规范 v1.0
 *  工具通过 postMessage 与组件通信，组件也通过 postMessage 回传数据
 *  不需要全部实现，只实现你用到的部分
 * ─────────────────────────────────────────────────────────────
 */

// ── 1. 当前配置（工具会通过 SET_CONFIG 消息更新这里）────────────────────
let config = {
  // 主题色（跟随会场全局主题）
  primaryColor: '#fad900',   // 美团黄
  accentColor:  '#ffa203',   // 暖橙
  bgColor:      '#FFD9E5',   // 会场背景色

  // 文案（工具配置面板中的输入框内容）
  texts: {
    title:    '节日限定花',    // 主标题
    subtitle: '心意即刻达',    // 副标题
    desc:     '直降低至5折起', // 描述
  },

  // 图片（用户上传的图片，base64 或 URL）
  images: {
    main: '',  // 主图
  },

  // 自定义（你的组件特有参数，自由定义）
  custom: {
    animSpeed: 1.0,   // 动效速度倍率
    loop: true,       // 是否循环
  },
}

// ── 2. 渲染函数（你的核心逻辑写在这里）────────────────────────────────
function render(cfg) {
  // 应用新配置
  config = { ...config, ...cfg }

  // TODO: 你的渲染代码
  const canvas = document.getElementById('canvas')
  const ctx = canvas.getContext('2d')

  // 示例：填充背景色
  ctx.fillStyle = config.bgColor
  ctx.fillRect(0, 0, 750, 424)

  // 示例：写文字
  ctx.fillStyle = '#333'
  ctx.font = 'bold 48px PingFang SC, sans-serif'
  ctx.textAlign = 'center'
  ctx.fillText(config.texts.title, 375, 200)
}

// ── 3. 导出为 PNG（工具点「下载素材」时触发）──────────────────────────
function exportPNG() {
  const canvas = document.getElementById('canvas')
  return canvas.toDataURL('image/png')
  // 如果用 div 布局没有 canvas，用 html2canvas：
  // return html2canvas(document.getElementById('root')).then(c => c.toDataURL())
}

// ── 4. 接收工具发来的消息 ───────────────────────────────────────────────
window.addEventListener('message', (event) => {
  const { type, payload } = event.data || {}
  if (!type) return

  switch (type) {

    // 工具更新配置（颜色/文案/图片等）
    case 'SG_SET_CONFIG':
      render(payload)
      break

    // 工具请求导出 PNG
    case 'SG_EXPORT':
      window.parent.postMessage({
        type: 'SG_EXPORT_RESULT',
        dataUrl: exportPNG(),
      }, '*')
      break

    // 工具请求刷新预览
    case 'SG_PREVIEW':
      window.parent.postMessage({
        type: 'SG_PREVIEW_RESULT',
        dataUrl: exportPNG(),
      }, '*')
      break
  }
})

// ── 5. 告诉工具「我已准备好」（页面加载完成后发送）──────────────────
window.addEventListener('load', () => {
  // 先做一次默认渲染
  render(config)

  // 通知工具：组件就绪
  window.parent.postMessage({
    type: 'SG_READY',
    meta: {
      name:   document.querySelector('meta[name="sg-name"]').content,
      id:     document.querySelector('meta[name="sg-id"]').content,
      width:  750,
      height: 424,
    },
  }, '*')
})
</script>

</body>
</html>
